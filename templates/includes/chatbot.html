<div class="chatbot" aria-label="LEARNible help chat">
    <div class="chatbot-window" id="chatbotWindow">
        <div class="chatbot-header">
            <h3><span class="logo-learn">LEARN</span><span class="logo-ible">ible</span> Help</h3>
            <button type="button" class="chatbot-minimize" onclick="toggleChatbot()" aria-label="Minimize chat">−</button>
        </div>
        <div class="chatbot-body">
            <div class="faq-buttons">
                <button type="button" class="faq-btn" data-faq="pricing">💰 How does pricing work?</button>
                <button type="button" class="faq-btn" data-faq="instructor">👨‍🏫 How do I become an instructor?</button>
                <button type="button" class="faq-btn" data-faq="earnings">💵 How much can I earn?</button>
                <button type="button" class="faq-btn" data-faq="payments">💳 What payment methods do you accept?</button>
                <button type="button" class="faq-btn" data-faq="currencies">🌍 Which currencies are supported?</button>
            </div>
        </div>
        <div class="chatbot-input">
            <input type="text" placeholder="Type your message..." aria-label="Chat message">
            <button type="button" aria-label="Send message">→</button>
        </div>
    </div>
    <button type="button" class="chatbot-toggle" onclick="toggleChatbot()" aria-label="Open help chat">💬</button>
</div>
